<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCEP Robertsongonj Technical School - Mark Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-white: #ffffff;
            --color-primary: #74117c;
            --color-primary-hover: #5a0b61;
            --color-light-header: #f4ecf7;
            --color-header-text: #74117c;
            --success: #198754;
            --border-radius: 12px;
            --box-shadow: 0 4px 12px rgba(116, 17, 124, 0.08);
            --muted: #666;
        }
        body { font-family: 'Poppins', Arial, sans-serif; background: #f5f4f7; padding: 20px; color: #111; }
        .main-container { max-width: 1000px; margin: 0 auto; }
        .school-header { text-align: center; margin-bottom: 24px; background: var(--color-primary); padding: 20px; border-radius: var(--border-radius); box-shadow: var(--box-shadow); }
        .school-header h2 { color: white; font-size: 1.5rem; font-weight: 700; }
        .school-header p { color: #f4ecf7; font-size: 1rem; font-weight: 500; margin-top: 5px; }
        
        .card-panel { background: var(--color-white); border-radius: var(--border-radius); padding: 20px 24px; margin-bottom: 25px; box-shadow: var(--box-shadow); border: 1px solid #e1bee7; }
        .row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 12px; }
        .row label { font-weight: 600; color: #333; min-width: 120px; font-size: 0.95rem; }
        
        select, input { padding: 10px 12px; border-radius: 8px; border: 1px solid #d1c4e9; font-size: 0.95rem; flex: 1; font-family: 'Poppins', sans-serif; }
        button { background: var(--color-primary); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--color-primary-hover); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button.success { background: var(--success); }
        button.info { background: #0dcaf0; }
        button.info:hover { background: #0aa8cc; }
        
        .fee-table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--color-white); border-radius: 12px; overflow: hidden; box-shadow: var(--box-shadow); }
        th, td { border: 1px solid #e1bee7; padding: 10px; text-align: center; font-size: 0.9rem; }
        th { background: var(--color-light-header); color: var(--color-header-text); font-weight: 600; }
        
        .mark { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #cfd8e6; border-radius: 4px; font-size: 14px; }
        .mark:focus { outline: none; border-color: var(--color-primary); }

        .alert { padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 0.9rem; text-align: center; }
        .alert.error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .loading { font-size: 13px; color: var(--muted); margin-left: 10px; }
        .note { font-size: 0.85rem; color: var(--muted); margin-top: 10px; text-align: center; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:30px; border-radius:16px; width:90%; max-width:400px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-box h2 { color: var(--success); margin-bottom:20px; font-size: 1.5rem; }
        
        .button-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="school-header">
        <h2>UCEP Robertsongonj Technical School</h2>
        <p>Half yearly exam Mark entry Form</p>
    </div>

    <div class="card-panel">
        <div class="row">
            <label for="classSelect">Class & Section</label>
            <select id="classSelect">
                <option value="">-- Select Class & Section --</option>
                <option value="VI-A">VI-A</option><option value="VI-B">VI-B</option>
                <option value="VII-A">VII-A</option><option value="VII-B">VII-B</option>
                <option value="VIII-A">VIII-A</option><option value="VIII-B">VIII-B</option>
                <option value="IX-GEW">IX-GEW</option><option value="IX-ICT">IX-ICT</option><option value="IX-EMW">IX-EMW</option>
                <option value="X-GEW">X-GEW</option><option value="X-EMW">X-EMW</option>
                <option value="X-ICT">X-ICT</option>
            </select>
        </div>

        <div class="row">
            <label for="subjectSelect">Subject</label>
            <select id="subjectSelect" disabled>
                <option value="">-- Select Subject --</option>
            </select>
        </div>

        <div class="row" style="justify-content:center; gap: 10px; margin-top: 20px;">
            <button id="searchBtn" disabled>🔍 Search Students</button>
            <button id="viewBtn" class="info" disabled>👁️ View Results</button>
        </div>
        
        <div id="alertBox"></div>
        <p class="note">Search বাটনে ক্লিক করলে ছাত্র-ছাত্রীর তালিকা লোড হবে। তারপর প্রতিটি ছাত্রের মার্ক এন্ট্রি করে Save করুন। View বাটনে ক্লিক করলে সব ছাত্রের ফলাফল দেখা যাবে।</p>
    </div>

    <div class="fee-table-container" id="resultArea"></div>
</div>

<div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width: 500px; text-align: left;">
        <h3>Are you sure???</h3>
        <div id="modalReviewContent" style="margin:20px 0; max-height: 300px; overflow-y:auto;"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="noBtn" style="background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">No</button>
            <button id="yesBtn" class="success" style="padding:10px 20px; border-radius:8px; cursor:pointer;">Yes</button>
        </div>
    </div>
</div>

<div id="successModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h2>Data Saved Successfully!</h2>
        <button id="okBtn" class="success" style="width:100%; font-size:1.1rem; padding:10px;">OK</button>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbygcl2QtNaNzZcm1uYWZjDMVuWALr5YndMhbfmHTak85Mu2gGIxP5rCxD4X8D5LQiR89Q/exec';
    const SHEET_ID = '1Fvl3Ag_5sZjN35jja5nkpnpun3w8v_hagBOKd_7wMYE';
    
    const classSelect = document.getElementById('classSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const searchBtn = document.getElementById('searchBtn');
    const viewBtn = document.getElementById('viewBtn');
    const resultArea = document.getElementById('resultArea');
    const alertBox = document.getElementById('alertBox');
    
    const confirmModal = document.getElementById('confirmModal');
    const successModal = document.getElementById('successModal');
    const modalReviewContent = document.getElementById('modalReviewContent');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const okBtn = document.getElementById('okBtn');

    // Class to Sheet GID mapping
    const classSheetMap = {
        'VI-A': '915981302',
        'VI-B': '1641892002',
        'VII-A': '108812483',
        'VII-B': '1407362802',
        'VIII-A': '1361023824',
        'VIII-B': '606332958',
        'IX-GEW': '1916559842',
        'IX-ICT': '897839570',
        'IX-EMW': '336800309',
        'X-GEW': '2112984746',
        'X-EMW': '2107846016',
        'X-ICT': '1731350343'
    };

    // Subject column mapping (D-U for each subject set, then repeats)
    const subjectColumns = {
        0: { marks: 'D', grade: 'E', gpa: 'F' },      // Subject 1
        1: { marks: 'G', grade: 'H', gpa: 'I' },      // Subject 2
        2: { marks: 'J', grade: 'K', gpa: 'L' },      // Subject 3
        3: { marks: 'M', grade: 'N', gpa: 'O' },      // Subject 4
        4: { marks: 'P', grade: 'Q', gpa: 'R' },      // Subject 5
        5: { marks: 'S', grade: 'T', gpa: 'U' },      // Subject 6
        6: { marks: 'V', grade: 'W', gpa: 'X' },      // Subject 7
        7: { marks: 'Y', grade: 'Z', gpa: 'AA' },     // Subject 8
        8: { marks: 'AB', grade: 'AC', gpa: 'AD' },   // Subject 9
        9: { marks: 'AE', grade: 'AF', gpa: 'AG' },   // Subject 10
        10: { marks: 'AH', grade: 'AI', gpa: 'AJ' }   // Subject 11
    };

    // Reset Page Function
    function resetPage() {
        classSelect.value = "";
        subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
        subjectSelect.disabled = true;
        searchBtn.disabled = true;
        viewBtn.disabled = true;
        resultArea.innerHTML = '';
        alertBox.innerHTML = '';
    }

    function showAlert(msg, type = 'info'){
      alertBox.innerHTML = `<div class="alert ${type}">${msg}</div>`;
      setTimeout(()=>{ alertBox.innerHTML = ''; }, 5000);
    }

    noBtn.onclick = () => { confirmModal.style.display = 'none'; };
    okBtn.onclick = () => { 
        successModal.style.display = 'none'; 
        resetPage();
    };

    async function appsScriptGET(action, params = {}){
      const url = new URL(WEB_APP_URL);
      url.searchParams.append('action', action);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      const resp = await fetch(url.toString());
      return await resp.json();
    }

    async function appsScriptPOST(payload){
      const resp = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      return await resp.json();
    }

    classSelect.addEventListener('change', async ()=>{
      const cls = classSelect.value;
      subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
      subjectSelect.disabled = true; 
      searchBtn.disabled = true; 
      viewBtn.disabled = true; 
      resultArea.innerHTML = '';
      if(!cls) return;
      try{
        const result = await appsScriptGET('getSubjects', {classKey: cls});
        result.subjects.forEach(subj => {
          const opt = document.createElement('option');
          opt.value = subj.index; 
          opt.textContent = subj.label;
          subjectSelect.appendChild(opt);
        });
        subjectSelect.disabled = false; 
        searchBtn.disabled = false; 
        viewBtn.disabled = false;
      }catch(err){ 
        showAlert('সাবজেক্ট লোড করতে সমস্যা', 'error'); 
      }
    });

    searchBtn.addEventListener('click', async ()=>{
      const cls = classSelect.value;
      const subjIndex = subjectSelect.value;
      if(!cls || subjIndex === '') return showAlert('ক্লাস ও সাবজেক্ট সিলেক্ট করুন', 'error');
      
      try{
        const result = await appsScriptGET('viewStudents', {classKey: cls, subjectIndex: subjIndex});
        const students = result.students || [];
        
        if(students.length === 0) {
          resultArea.innerHTML = '<p style="text-align:center; color:#666;">কোন ছাত্র পাওয়া যায়নি।</p>';
          return;
        }
        
        resultArea.innerHTML = '';
        const table = document.createElement('table');
        table.innerHTML = '<thead><tr><th>Name</th><th>Roll</th><th>Mark</th></tr></thead>';
        const tbody = document.createElement('tbody');
        
        students.forEach((stud, idx) => {
          const tr = document.createElement('tr');
          const markValue = stud.mark || '';
          tr.innerHTML = `<td>${stud.name}</td><td>${stud.roll}</td><td><input class="mark" type="number" min="0" value="${markValue}" data-student-index="${idx}"></td>`;
          tbody.appendChild(tr);
        });
        
        table.appendChild(tbody);
        resultArea.appendChild(table);

        const saveBtn = document.createElement('button');
        saveBtn.className = 'success';
        saveBtn.textContent = '💾 Save All Marks';
        saveBtn.style.marginTop = '20px';
        saveBtn.style.width = '100%';
        saveBtn.onclick = ()=> initiateSave(cls, subjIndex, students);
        resultArea.appendChild(saveBtn);
      }catch(err){ 
        console.error('Error:', err);
        showAlert('ছাত্র লোড করতে সমস্যা: ' + err.message, 'error'); 
      }
    });

    viewBtn.addEventListener('click', async ()=>{
      const cls = classSelect.value;
      const subjIndex = subjectSelect.value;
      if(!cls || subjIndex === '') return showAlert('ক্লাস ও সাবজেক্ট সিলেক্ট করুন', 'error');
      
      try{
        const result = await appsScriptGET('viewResultsReport', {
          classKey: cls, 
          subjectIndex: subjIndex,
          sheetId: SHEET_ID,
          gid: classSheetMap[cls]
        });
        
        const students = result.students || [];
        
        if(students.length === 0) {
          resultArea.innerHTML = '<p style="text-align:center; color:#666;">কোন ডাটা পাওয়া যায়নি।</p>';
          return;
        }
        
        resultArea.innerHTML = '';
        const table = document.createElement('table');
        table.innerHTML = '<thead><tr><th>Sl No.</th><th>Name</th><th>Roll</th><th>Marks</th><th>Grade</th><th>GPA</th></tr></thead>';
        const tbody = document.createElement('tbody');
        
        students.forEach((stud, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${stud.name}</td>
            <td>${stud.roll}</td>
            <td>${stud.marks || '-'}</td>
            <td>${stud.grade || '-'}</td>
            <td>${stud.gpa || '-'}</td>
          `;
          tbody.appendChild(tr);
        });
        
        table.appendChild(tbody);
        resultArea.appendChild(table);
      }catch(err){ 
        console.error('Error:', err);
        showAlert('ফলাফল লোড করতে সমস্যা: ' + err.message, 'error'); 
      }
    });

    function initiateSave(classKey, subjectIndex, students) {
        const inputs = Array.from(document.querySelectorAll('#resultArea input.mark'));
        const marks = inputs.map(inp => inp.value.trim());
        if(marks.every(m => m === '')) return showAlert('কমপক্ষে একটি মার্ক এন্ট্রি করুন', 'error');

        let htmlContent = '<table style="width:100%; border-collapse: collapse;">';
        students.forEach((s, i) => {
            if(marks[i] !== '') htmlContent += `<tr><td>${s.name}</td><td>${s.roll}</td><td><b>${marks[i]}</b></td></tr>`;
        });
        htmlContent += '</table>';
        modalReviewContent.innerHTML = htmlContent;
        confirmModal.style.display = 'flex';

        yesBtn.onclick = async () => {
            confirmModal.style.display = 'none';
            await saveMarksToSheet(classKey, subjectIndex, marks.map(m => m === '' ? '' : Number(m)));
        };
    }

    async function saveMarksToSheet(classKey, subjectIndex, marksArray){
      try{
        const payload = { action: 'saveMarks', sheetId: SHEET_ID, classKey: classKey, subjectIndex: Number(subjectIndex), marks: marksArray };
        const result = await appsScriptPOST(payload);
        if(result.status === 'ok') {
            successModal.style.display = 'flex';
        } else {
            throw new Error(result.message);
        }
      }catch(err){ 
        console.error('Error:', err);
        showAlert('সংরক্ষণে সমস্যা: ' + err.message, 'error'); 
      }
    }
</script>
</body>
</html>
