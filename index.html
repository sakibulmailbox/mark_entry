<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCEP Robertsongonj Technical School - Mark Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #198754;
            --secondary: #0d6efd;
            --bg-color: #fdfcf0; /* Screenshot background color */
            --text-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); padding: 15px; color: var(--text-color); }
        .main-container { max-width: 800px; margin: 0 auto; }

        /* Header Style */
        .school-header { 
            text-align: center; margin-bottom: 20px; 
            background: #ffffff; padding: 20px; border-radius: 15px; 
            border: 1px solid #ddd;
        }
        .school-header h2 { color: var(--secondary); font-size: 1.5rem; }
        .school-header p { color: #666; font-size: 0.9rem; }

        .card-panel { background: #ffffff; border-radius: 15px; padding: 20px; border: 1px solid #ddd; }
        
        /* Inputs & Buttons */
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; width: 100%; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        /* Table Styling with Borders */
        .fee-table-container { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f8f9fa; color: #333; font-size: 0.9rem; }
        
        /* Specific Column Widths */
        .col-roll { width: 60px; }
        .col-mark { width: 80px; }
        .input-mark { width: 60px; padding: 5px; text-align: center; }

        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:20px; border-radius:15px; width:95%; max-width:450px; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="school-header no-print">
        <h2>UCEP Robertsongonj Technical School</h2>
        <p>Student Mark Entry-26</p>
    </div>

    <div class="card-panel no-print">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <select id="classSelect">
                <option value="">-- Select Class --</option>
                <option value="VI-A">VI-A</option><option value="VI-B">VI-B</option>
                <option value="VII-A">VII-A</option><option value="VII-B">VII-B</option>
                <option value="VIII-A">VIII-A</option><option value="VIII-B">VIII-B</option>
                <option value="IX-GEW">IX-GEW</option><option value="IX-ICT">IX-ICT</option><option value="IX-EMW">IX-EMW</option>
                <option value="X-GEW">X-GEW</option><option value="X-EMW">X-EMW</option>
                <option value="X-ICT">X-ICT</option>
            </select>
            <select id="subjectSelect" disabled>
                <option value="">-- Select Subject --</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id="searchBtn" disabled>🔍 Search</button>
            <button id="viewBtn" style="background:#0dcaf0; color:black;" disabled>👁️ View</button>
        </div>
    </div>

    <div id="resultArea" style="margin-top: 20px;"></div>
</div>

<div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h3 style="margin-bottom:15px;">Confirm Submission</h3>
        <div id="modalReviewContent" style="margin-bottom:20px; max-height: 300px; overflow-y:auto;"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="noBtn" style="background:#dc3545;">Cancel</button>
            <button id="yesBtn">Confirm</button>
        </div>
    </div>
</div>

<div id="successModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="text-align:center;">
        <h3>Success!</h3>
        <p>Data saved.</p>
        <button id="okBtn" style="margin-top:20px; width:100%;">OK</button>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbygcl2QtNaNzZcm1uYWZjDMVuWALr5YndMhbfmHTak85Mu2gGIxP5rCxD4X8D5LQiR89Q/exec';
    const SHEET_ID = '1Fvl3Ag_5sZjN35jja5nkpnpun3w8v_hagBOKd_7wMYE';
    
    const classSelect = document.getElementById('classSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const searchBtn = document.getElementById('searchBtn');
    const viewBtn = document.getElementById('viewBtn');
    const resultArea = document.getElementById('resultArea');

    async function appsScriptGET(action, params = {}){
      const url = new URL(WEB_APP_URL);
      url.searchParams.append('action', action);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      const resp = await fetch(url.toString());
      return await resp.json();
    }

    async function appsScriptPOST(payload){
      const resp = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
      return await resp.json();
    }

    classSelect.addEventListener('change', async ()=>{
      const cls = classSelect.value;
      subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
      subjectSelect.disabled = !cls; searchBtn.disabled = !cls; viewBtn.disabled = !cls;
      if(!cls) return;
      try{
        const result = await appsScriptGET('getSubjects', {classKey: cls});
        result.subjects.forEach(subj => {
          const opt = document.createElement('option');
          opt.value = subj.index; opt.textContent = subj.label;
          subjectSelect.appendChild(opt);
        });
      }catch(err){ alert('Error'); }
    });

    searchBtn.addEventListener('click', async ()=>{
      const result = await appsScriptGET('viewStudents', {classKey: classSelect.value, subjectIndex: subjectSelect.value});
      const students = result.students || [];
      if(students.length === 0) return resultArea.innerHTML = '<p style="text-align:center;">No students.</p>';
      
      resultArea.innerHTML = `<table><thead><tr><th class="col-roll">Roll</th><th>Name</th><th class="col-mark">Mark</th></tr></thead><tbody id="markTbody"></tbody></table>`;
      const tbody = document.getElementById('markTbody');
      students.forEach((stud, idx) => {
        tbody.innerHTML += `<tr><td>${stud.roll}</td><td style="text-align:left;">${stud.name}</td><td><input class="mark input-mark" type="number" value="${stud.mark || ''}" data-student-index="${idx}"></td></tr>`;
      });
      const btn = document.createElement('button');
      btn.style.marginTop = '20px'; btn.style.width = '100%'; btn.textContent = '💾 Save All';
      btn.onclick = () => initiateSave(classSelect.value, subjectSelect.value, students);
      resultArea.appendChild(btn);
    });

    function initiateSave(classKey, subjectIndex, students) {
        const inputs = document.querySelectorAll('#markTbody input.mark');
        let htmlContent = '<table style="width:100%; border:1px solid #ddd; border-collapse:collapse;"><thead><tr><th>Roll</th><th>Name</th><th>Mark</th></tr></thead><tbody>';
        let count = 0;
        inputs.forEach((inp, i) => {
            if(inp.value.trim() !== '') {
                htmlContent += `<tr><td>${students[i].roll}</td><td style="text-align:left;">${students[i].name}</td><td><b>${inp.value}</b></td></tr>`;
                count++;
            }
        });
        htmlContent += '</tbody></table>';
        document.getElementById('modalReviewContent').innerHTML = htmlContent + `<p style="margin-top:10px;">Total: ${count}</p>`;
        document.getElementById('confirmModal').style.display = 'flex';

        document.getElementById('yesBtn').onclick = async () => {
            document.getElementById('confirmModal').style.display = 'none';
            const marks = Array.from(inputs).map(inp => inp.value === '' ? '' : Number(inp.value));
            const res = await appsScriptPOST({ action: 'saveMarks', sheetId: SHEET_ID, classKey: classKey, subjectIndex: Number(subjectIndex), marks: marks });
            if(res.status === 'ok') document.getElementById('successModal').style.display = 'flex';
        };
    }

    viewBtn.addEventListener('click', async ()=>{
      const res = await appsScriptGET('viewResultsReport', {classKey: classSelect.value, subjectIndex: subjectSelect.value, sheetId: SHEET_ID, gid: ''});
      let html = '<table><thead><tr><th class="col-roll">Roll</th><th>Name</th><th>Marks</th><th>Grade</th><th>GPA</th></tr></thead><tbody>';
      res.students.forEach((s) => html += `<tr><td>${s.roll}</td><td style="text-align:left;">${s.name}</td><td>${s.marks||'-'}</td><td>${s.grade||'-'}</td><td>${s.gpa||'-'}</td></tr>`);
      html += '</tbody></table>';
      html += `<div style="margin-top:20px; display:flex; gap:10px;" class="no-print"><button onclick="window.print()">🖨️ Print</button><button onclick="document.getElementById('resultArea').innerHTML=''" style="background:#dc3545;">❌ Clear</button></div>`;
      resultArea.innerHTML = html;
    });

    document.getElementById('noBtn').onclick = () => document.getElementById('confirmModal').style.display = 'none';
    document.getElementById('okBtn').onclick = () => { document.getElementById('successModal').style.display = 'none'; location.reload(); };
</script>
</body>
</html>
